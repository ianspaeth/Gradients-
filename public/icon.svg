<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="grad" cx="50%" cy="50%" r="70%" fx="20%" fy="20%">
      <stop offset="0%" style="stop-color:#ffff00;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#00ff00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ffcc;stop-opacity:1" />
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12" />
      <feOffset dx="0" dy="12" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.25" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" fill="url(#grad)" />
  
  <!-- White Outer Ring/Circle -->
  <circle cx="256" cy="256" r="138" fill="white" filter="url(#shadow)" />
  
  <!-- Yellow Inner Circle -->
  <circle cx="256" cy="256" r="112" fill="#ffff00" />
  
  <!-- Subtle Highlight/Glow -->
  <circle cx="210" cy="210" r="40" fill="white" fill-opacity="0.15" filter="blur(15px)" />
</svg>
